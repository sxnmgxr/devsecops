name: CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

permissions:
  contents: write
  security-events: write
  packages: write

env:
  IMAGE_NAME: book-ticketing-app
  REGISTRY: ghcr.io

jobs:

  # ─────────────────────────────────────────────
  # 1. LINT & FORMAT
  # ─────────────────────────────────────────────
  lint:
    name: 🔍 Lint & Format
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: ${{ github.head_ref }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install tools
        run: pip install "black==24.4.2" "flake8==7.0.0" "isort==5.13.2"

      - name: Auto-format with black
        run: black src/

      - name: Auto-sort imports
        run: isort --profile black src/

      - name: Commit formatting fixes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "style: auto-format with black and isort"
          file_pattern: "src/**/*.py"

      - name: Run flake8
        run: flake8 src/

      - name: Check black
        run: black --check src/

      - name: Check isort
        run: isort --profile black --check-only src/

  # ─────────────────────────────────────────────
  # 2. SAST — Bandit + Semgrep
  # ─────────────────────────────────────────────
  sast:
    name: 🔒 SAST Scan
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      # --- Bandit (Python security linter) ----
      - name: Bandit — Python Security Linter
        run: |
          pip install bandit
          bandit -r src/ \
            --exclude src/tests \
            -f json \
            -o bandit-report.json || true

      - uses: actions/upload-artifact@v4
        with:
          name: bandit-report
          path: bandit-report.json

      # --- Semgrep --------------------------------
      # FIX 1: Added .semgrepignore to exclude venv/ — all 26 findings were
      #         false positives inside pip's own vendored code inside venv/.
      # FIX 2: Upgraded from semgrep-action@v1 (unsupported, v<1.76.0)
      #         to the current semgrep/semgrep-action@v2.
      - name: Create .semgrepignore
        run: |
          cat > .semgrepignore << 'EOF'
          venv/
          .venv/
          node_modules/
          dist/
          build/
          __pycache__/
          *.pyc
          tests/
          EOF

      - name: Semgrep — OWASP Rules
        uses: semgrep/semgrep-action@v2        # FIX: v1 is deprecated / unsupported
        with:
          config: >-
            p/owasp-top-ten
            p/python
            p/secrets
            p/jwt
        env:
          SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}

  # ─────────────────────────────────────────────
  # 3. DEPENDENCY SCAN — Snyk
  # ─────────────────────────────────────────────
  dependency-scan:
    name: 📦 Dependency Scan
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # FIX 3: Install deps before Snyk scan so it can resolve the graph.
      - name: Install Python dependencies
        run: pip install -r requirements.txt

      # FIX 4: Corrected invalid version httpx==0.27.0e → httpx==0.27.0
      #         (done in requirements.txt — see note below)

      # FIX 5: snyk/actions/python@master now has Poetry validation.
      #         Pass --package-manager=pip so Snyk skips pyproject.toml parsing.
      - name: Snyk vulnerability scan
        uses: snyk/actions/python@master
        continue-on-error: true              # Report findings; don't hard-block
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: >-
            --severity-threshold=high
            --file=requirements.txt
            --package-manager=pip
            --sarif-file-output=snyk.sarif

      - name: Upload Snyk results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: snyk.sarif

  # ─────────────────────────────────────────────
  # 4. BUILD & PUSH DOCKER IMAGE
  # ─────────────────────────────────────────────
  build:
    name: 🐳 Build & Push Image
    runs-on: ubuntu-latest
    needs: [sast, dependency-scan]
    permissions:
      contents: read
      packages: write
    outputs:
      image-tag: ${{ github.sha }}
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # FIX 6: Pinned build-push-action to v6 (v5 has known cache issues)
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ env.REGISTRY }}/${{ github.repository }}/${{ env.IMAGE_NAME }}:${{ github.sha }}

  # ─────────────────────────────────────────────
  # 5. CONTAINER SCAN — Trivy
  # ─────────────────────────────────────────────
  container-scan:
    name: 🛡️ Trivy Container Scan
    runs-on: ubuntu-latest
    needs: build
    permissions:
      security-events: write
    steps:
      - uses: actions/checkout@v4

      # FIX 7: Pin Trivy to a stable version tag (not @master which can break)
      - name: Run Trivy
        uses: aquasecurity/trivy-action@0.30.0
        with:
          image-ref: ${{ env.REGISTRY }}/${{ github.repository }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          exit-code: '1'

      - name: Upload Trivy results
        uses: github/codeql-action/upload-sarif@v3
        if: always()                         # Upload even if Trivy found issues
        with:
          sarif_file: trivy-results.sarif

  # ─────────────────────────────────────────────
  # 6. SONARCLOUD — Quality Gate
  # ─────────────────────────────────────────────
  sonarcloud:
    name: 📊 SonarCloud Quality Gate
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0                     # Required for blame & new-code analysis

      # FIX 8: Replaced deprecated sonarcloud-github-action@master
      #         with the current sonarqube-scan-action@v5.0.0.
      # FIX 9: You MUST disable "Automatic Analysis" in SonarCloud UI:
      #         Project → Administration → Analysis Method → toggle OFF
      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@v5.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}